services:
  react-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: react-app
    restart: always  # Added for auto-start
    ports:
      - "80:80"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always  # Added for auto-start
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always  # Added for auto-start
    ports:
      - "3000:3000"
    networks:
      - monitoring
    volumes:
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_RENDERING_SERVER_URL=http://grafana-image-renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
      - GF_SERVER_DOMAIN=13.203.106.154
      - GF_SERVER_ROOT_URL=http://13.203.106.154:3000/
      - GF_RENDERING_VIEWPORT_WIDTH=1920
      - GF_RENDERING_VIEWPORT_HEIGHT=9000
      - GF_RENDERING_VIEWPORT_DEVICE_SCALE_FACTOR=2
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=bibekkumarsahu2011@gmail.com
      - GF_SMTP_PASSWORD=ctskxkineroutcaj
      - GF_SMTP_SKIP_VERIFY=false
      - GF_SMTP_FROM_ADDRESS=bibekkumarsahu2011@gmail.com
      - GF_SMTP_FROM_NAME=Grafana Alerts
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    restart: always  # Added for auto-start
    ports:
      - "9200:9100"
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always  # Added for auto-start
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    restart: always  # Added for auto-start
    command: -nginx.scrape-uri=http://react-app:80/stub_status
    ports:
      - "9113:9113"
    networks:
      - monitoring

  grafana-image-renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana-image-renderer
    restart: always  # Added for auto-start
    networks:
      - monitoring

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: always  # Added for auto-start
    ports:
      - "9115:9115"
    networks:
      - monitoring
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - ../monitoring/blackbox.yml:/etc/blackbox/blackbox.yml

networks:
  monitoring:
    driver: bridge

volumes:
  grafana-storage:
    external: true
