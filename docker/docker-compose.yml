services:
  react-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: react-app
    restart: always
    ports:
      - "80:80"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    networks:
      - monitoring
    volumes:
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_RENDERING_SERVER_URL=http://grafana-image-renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
      - GF_LOG_LEVEL=debug # Useful for troubleshooting renderer issues
      - GF_SERVER_DOMAIN=65.2.56.74
      - GF_SERVER_ROOT_URL=http://65.2.56.74:3000/
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=bibekkumarsahu2011@gmail.com
      - GF_SMTP_PASSWORD=ctskxkineroutcaj
      - GF_SMTP_SKIP_VERIFY=false
      - GF_SMTP_FROM_ADDRESS=bibekkumarsahu2011@gmail.com
      - GF_SMTP_FROM_NAME=Grafana Alerts
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS

  grafana-image-renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana-image-renderer
    restart: always
    networks:
      - monitoring
    environment:
      - ENABLE_METRICS=true
      - BROWSER_BIN=/usr/bin/google-chrome
      - IGNORE_HTTPS_ERRORS=true

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: always
    cap_add:
      - NET_RAW # Required for ICMP (Ping) probes to work
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "9115:9115"
    networks:
      - monitoring
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - ../monitoring/blackbox.yml:/etc/blackbox/blackbox.yml

  # ... (node-exporter, cadvisor, and nginx-exporter settings remain same)
  # Ensure nginx-exporter command uses the service name 'react-app'
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    restart: always
    command: -nginx.scrape-uri=http://react-app:80/stub_status
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  grafana-storage:
    external: true
