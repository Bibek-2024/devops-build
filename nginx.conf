events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Serve your React build
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }

        # Expose Nginx stub_status for Prometheus exporter
        location /stub_status {
            stub_status on;       # Corrected syntax: 'on' is required
            access_log off;       # Keep logs clean from exporter scrapes
            
            # Allows the exporter to reach the status page from the Docker network
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Standard Docker internal network range
            allow 192.168.0.0/16; # Alternative Docker/Private range
            
            # Use 'allow all' ONLY if the above ranges don't work during testing
            # allow all; 
        }
    }
}
